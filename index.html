<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>跳转中...</title>
</head>
<body>
<script>
const p=new URLSearchParams(location.search);
const v=p.get("v")||"";
const f=p.get("f")||"";
if(v&&f){
 location.href="obsidian://open?vault="+encodeURIComponent(v)+"&file="+encodeURIComponent(f);
}else{
 document.write("参数错误");
}
</script>
</body>
</html>
